name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Test
        run: go test ./...

      - name: Vet
        run: go vet ./...

  build-and-upload:
    runs-on: ubuntu-latest
    needs: verify
    strategy:
      matrix:
        goarch: [amd64, arm64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Build archive
        env:
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
        run: |
          set -eu
          mkdir -p dist
          binary="routecheck"
          archive="routecheck-linux-${GOARCH}.tar.gz"
          go build -trimpath -ldflags="-s -w" -o "${binary}" .
          tar -czf "dist/${archive}" "${binary}"
          rm -f "${binary}"

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/routecheck-linux-${{ matrix.goarch }}.tar.gz
